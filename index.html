<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple Goals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins','Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
background:#ffffff;
color:#333;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
border-bottom:1px solid #eee;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:45px;
}

.logo h2{
color:#c9184a;
margin:0;
}

/* HERO */
.hero{
text-align:center;
padding:80px 20px;
background:linear-gradient(to bottom,#fff0f3,#ffffff);
}

.hero img{
width:200px;
margin-bottom:20px;
}

/* SECTION */
section{
padding:70px 50px;
text-align:center;
}

h2{color:#c9184a;}

/* BUTTON */
.main-btn{
background:#c9184a;
color:white;
padding:12px;
border:none;
border-radius:20px;
cursor:pointer;
width:100%;
}

/* QUIZ */
.quiz{
max-width:400px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<nav>
<div class="logo">
<img src="logo.jpeg">
<h2>Couple Goals</h2>
</div>
</nav>

<section class="hero">
<img src="logo.jpeg">
<h1>Find Your Perfect Date ❤️</h1>
<p>We create personalized date ideas for your special moments</p>
</section>

<section>
<h2>Find Your Perfect Date</h2>

<div class="quiz">

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="partner" placeholder="Partner Name">

<select id="domisili">
<option>Pontianak</option>
<option>Singkawang</option>
</select>

<select id="occasion">
<option>Valentine</option>
<option>Anniversary</option>
<option>Birthday</option>
</select>

<select id="hobby">
<option>Food Lover</option>
<option>Adventure</option>
<option>Gaming</option>
<option>Chill</option>
</select>

<select id="budget">
<option><100k</option>
<option>100k - 300k</option>
<option>>300k</option>
</select>

<button class="main-btn" onclick="generate()">Get Recommendation</button>

</div>
</section>

<script>
function generate(){

let name=document.getElementById("name").value;
let partner=document.getElementById("partner").value;
let domisili=document.getElementById("domisili").value;
let occasion=document.getElementById("occasion").value;
let hobby=document.getElementById("hobby").value;
let budget=document.getElementById("budget").value;

if(name==""||partner==""){
alert("Isi nama dulu ya!");
return;
}

let idea="";

if(budget=="<100k"){
idea="• Coffee Date ☕\n• Movie Date 🎬\n";
}
else if(budget=="100k - 300k"){
idea="• Picnic Date 🌿\n• Romantic Dinner 🍝\n";
}
else{
idea="• Staycation 🏨\n• Fine Dining 🍷\n";
}

if(hobby=="Food Lover") idea+="• Culinary Tour 🍜\n";
if(hobby=="Adventure") idea+="• Outdoor Date 🌄\n";
if(hobby=="Gaming") idea+="• Arcade Date 🎮\n";
if(hobby=="Chill") idea+="• Netflix Date 🛋️\n";

if(domisili=="Singkawang") idea+="• Beach Date 🌊\n";
if(domisili=="Pontianak") idea+="• Cafe Hopping ☕\n";

if(occasion=="Birthday") idea+="• Surprise Party 🎉\n";
if(occasion=="Anniversary") idea+="• Romantic Setup 💕\n";

let message = `Halo Couple Goals ❤️

Saya ${name} ingin konsultasi.
Pasangan saya: ${partner}

📍 Domisili: ${domisili}
🎉 Occasion: ${occasion}
💖 Hobby: ${hobby}
💰 Budget: ${budget}

✨ Ide:
${idea}

Mohon bantu rekomendasi terbaik ya 😊
Terima kasih 🙏`;

let link="https://api.whatsapp.com/send?phone=6289524070718&text="+encodeURIComponent(message);

window.open(link, "_blank");
}
</script>

</body>
</html>
